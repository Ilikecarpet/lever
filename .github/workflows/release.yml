name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: check
        run: |
          VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist, will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install --prefix ui

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Ensure cargo on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          NOTES=$(gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="v$VERSION" \
            -f target_commitish="${{ github.sha }}" \
            --jq .body)
          {
            echo "body<<NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "### Installation (macOS, Apple Silicon)"
            echo "Download the \`.dmg\`, open it, and drag Lever to Applications."
            echo ""
            echo "> **Note:** Since the app is not code-signed, macOS may flag it as damaged. Run this in Terminal to fix:"
            echo "> \`\`\`"
            echo "> xattr -cr /Applications/Lever.app"
            echo "> \`\`\`"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: "Lever v${{ needs.check-version.outputs.version }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
