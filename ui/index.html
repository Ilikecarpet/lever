<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lever</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <style>
    :root {
      --bg: #0c0e14;
      --sidebar-bg: #111420;
      --surface: #181c2a;
      --surface-hover: #1e2336;
      --border: #232839;
      --text: #e2e5f0;
      --text-dim: #6c7294;
      --text-muted: #3d4463;
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.12);
      --terminal-bg: #0a0c12;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---- Layout ---- */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 250px;
      min-width: 250px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 14px 14px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-top h1 { font-size: 13px; font-weight: 700; }
    .icon-btn {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 15px; padding: 4px 6px;
      border-radius: 4px; line-height: 1;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }

    .sidebar-scroll {
      flex: 1; overflow-y: auto; padding: 6px 0;
    }
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ---- Groups ---- */
    .group { margin-bottom: 2px; }

    .group-header {
      padding: 8px 14px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .group-header:hover { background: var(--surface-hover); }

    .group-chevron {
      font-size: 9px;
      color: var(--text-muted);
      transition: transform 0.15s;
      display: inline-block;
      margin-right: 4px;
    }
    .group.collapsed .group-chevron { transform: rotate(-90deg); }

    .group-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .group-count {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .group-actions {
      display: flex; gap: 2px;
      opacity: 0; transition: opacity 0.15s;
    }
    .group-header:hover .group-actions { opacity: 1; }

    .group-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; padding: 2px 6px; border-radius: 3px;
      font-weight: 600;
    }
    .group-btn.start { color: var(--green); }
    .group-btn.start:hover { background: var(--green-dim); }
    .group-btn.stop { color: var(--red); }
    .group-btn.stop:hover { background: var(--red-dim); }

    .group-services { padding: 2px 0; overflow: hidden; transition: max-height 0.2s ease; }
    .group.collapsed .group-services { max-height: 0 !important; padding: 0; }

    /* Add group button */
    .add-group-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      font-size: 11px; color: var(--text-muted);
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: left;
      font-weight: 600; letter-spacing: 0.04em;
    }
    .add-group-btn:hover { color: var(--text-dim); background: var(--surface-hover); }

    /* Git branch indicator (sidebar) */
    .git-branch {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 14px 6px 26px;
      font-size: 11px; color: var(--text-dim);
      cursor: pointer; user-select: none;
    }
    .git-branch:hover { background: var(--surface-hover); color: var(--text); }
    .git-branch-icon { font-size: 12px; opacity: 0.7; }
    .git-branch-name { font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 11px; }
    .git-dirty { color: var(--yellow); font-size: 9px; margin-left: 2px; }

    /* Git panel */
    .git-panel {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    .git-panel.active { display: flex; }

    .git-panel-header {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .git-panel-header h3 {
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .git-panel-header .git-actions { display: flex; gap: 6px; }

    .git-panel-body {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .git-panel-body::-webkit-scrollbar { width: 6px; }
    .git-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .git-section {
      border-bottom: 1px solid var(--border);
    }
    .git-section-header {
      padding: 10px 16px;
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .git-section-header:hover { background: var(--surface-hover); }
    .git-section-count {
      font-size: 10px; font-weight: 500;
      background: var(--surface); padding: 1px 6px; border-radius: 8px;
    }
    .git-section-body { padding: 0 0 6px; }

    .git-branch-search {
      width: calc(100% - 32px); margin: 0 16px 6px;
      padding: 6px 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px;
      font-family: inherit; outline: none;
    }
    .git-branch-search:focus { border-color: var(--blue); }

    .git-branch-item {
      padding: 5px 16px; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }
    .git-branch-item:hover { background: var(--surface-hover); color: var(--text); }
    .git-branch-item.current { color: var(--green); font-weight: 600; }
    .git-branch-item .check { font-size: 10px; width: 14px; flex-shrink: 0; }
    .git-branch-item .remote-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      background: rgba(139,92,246,0.12); color: #a78bfa;
      font-family: inherit; font-weight: 600;
    }

    .git-pr-item {
      padding: 8px 16px; cursor: pointer;
      display: flex; flex-direction: column; gap: 2px;
    }
    .git-pr-item:hover { background: var(--surface-hover); }
    .git-pr-row { display: flex; align-items: center; gap: 8px; }
    .git-pr-number { font-size: 11px; color: var(--blue); font-weight: 600; }
    .git-pr-title { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .git-pr-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 8px; }
    .git-pr-draft { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface); color: var(--text-muted); font-weight: 600; }

    .git-commit-item {
      padding: 5px 16px; display: flex; align-items: baseline; gap: 10px;
      font-size: 12px;
    }
    .git-commit-item:hover { background: var(--surface-hover); }
    .git-commit-hash {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--blue); flex-shrink: 0;
    }
    .git-commit-msg { color: var(--text-dim); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .git-commit-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

    .git-file-item {
      padding: 4px 16px; display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-family: 'SF Mono', 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }
    .git-file-item:hover { background: var(--surface-hover); }
    .git-file-badge {
      font-size: 9px; font-weight: 700; width: 14px; text-align: center;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .git-file-badge.modified { color: var(--yellow); }
    .git-file-badge.new { color: var(--green); }
    .git-file-badge.deleted { color: var(--red); }
    .git-file-badge.staged { color: var(--blue); }

    .git-loading { padding: 20px 16px; color: var(--text-muted); font-size: 12px; }
    .git-empty { padding: 12px 16px; color: var(--text-muted); font-size: 11px; font-style: italic; }
    .git-show-more {
      padding: 6px 16px; font-size: 11px; color: var(--blue);
      cursor: pointer; background: none; border: none;
      font-family: inherit; font-weight: 600; width: 100%; text-align: left;
    }
    .git-show-more:hover { background: var(--surface-hover); }

    /* ---- Service items ---- */
    .svc-item {
      padding: 6px 14px 6px 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 12px;
    }
    .svc-item:hover { background: var(--surface-hover); }

    .svc-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
    }
    .svc-dot.running {
      background: var(--green);
      box-shadow: 0 0 5px rgba(52,211,153,0.4);
    }

    .svc-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .svc-badge {
      font-size: 8px; padding: 1px 4px; border-radius: 2px;
      font-weight: 700; text-transform: uppercase;
      background: var(--blue-dim); color: var(--blue);
    }

    .svc-hover-actions {
      display: flex; gap: 1px;
      opacity: 0; transition: opacity 0.1s;
    }
    .svc-item:hover .svc-hover-actions { opacity: 1; }

    .svc-btn {
      background: none; border: none; cursor: pointer;
      width: 20px; height: 20px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; line-height: 1;
    }
    .svc-btn.play { color: var(--green); }
    .svc-btn.play:hover { background: var(--green-dim); }
    .svc-btn.kill { color: var(--red); }
    .svc-btn.kill:hover { background: var(--red-dim); }
    .svc-btn:disabled { opacity: 0.15; cursor: default; }

    /* ---- Main area ---- */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .tab-bar {
      display: flex;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      min-height: 32px;
      overflow-x: auto;
      align-items: stretch;
    }
    .tab-bar::-webkit-scrollbar { height: 0; }

    .tab {
      padding: 0 14px; height: 32px;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-dim); cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; flex-shrink: 0;
      font-weight: 500;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .tab.active { color: var(--text); border-bottom-color: var(--blue); background: var(--bg); }

    .tab .tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
    .tab .tdot.running { background: var(--green); }

    .tab .tclose {
      font-size: 14px; opacity: 0; color: var(--text-dim);
      padding: 0 2px; cursor: pointer;
    }
    .tab:hover .tclose { opacity: 0.5; }
    .tab .tclose:hover { opacity: 1; }

    .tab-new {
      padding: 0 10px; height: 32px;
      display: flex; align-items: center;
      font-size: 16px; color: var(--text-muted); cursor: pointer;
    }
    .tab-new:hover { color: var(--text); }

    /* Terminal panels */
    .term-area { flex: 1; position: relative; overflow: hidden; background: var(--terminal-bg); }

    .term-panel {
      position: absolute; inset: 0;
      display: none;
    }
    .term-panel.active { display: flex; flex-direction: column; }

    .term-panel .xterm { flex: 1; }

    /* Service log overlay */
    .log-overlay {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      background: rgba(10,12,18,0.95);
      backdrop-filter: blur(4px);
      z-index: 10;
      animation: logSlideIn 0.15s ease;
    }
    .log-overlay.open { display: flex; }
    @keyframes logSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .log-header {
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .log-header .log-close {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 16px; padding: 2px 6px; border-radius: 3px; line-height: 1;
    }
    .log-header .log-close:hover { background: var(--surface-hover); color: var(--text); }

    .log-output {
      flex: 1;
      padding: 12px 16px;
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px; line-height: 1.7;
      overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-dim);
      -webkit-user-select: text; user-select: text;
    }
    .log-output::-webkit-scrollbar { width: 6px; }
    .log-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .log-output .stderr { color: var(--yellow); }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 13px;
      background: var(--terminal-bg);
    }

    /* ---- Status bar ---- */
    .statusbar {
      height: 22px;
      background: var(--sidebar-bg);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 12px;
      font-size: 10px; color: var(--text-muted);
      gap: 14px;
    }

    /* ---- Settings / Form overlays (same as before) ---- */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; width: 520px; max-height: 80vh;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 16px 20px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 14px; font-weight: 600; }
    .modal-body { flex: 1; overflow-y: auto; padding: 12px; }

    .m-btn {
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--surface);
      color: var(--text); font-size: 12px; cursor: pointer;
    }
    .m-btn:hover { background: var(--surface-hover); }
    .m-btn.primary { background: var(--blue-dim); border-color: rgba(96,165,250,0.3); color: var(--blue); }
    .m-btn.danger { color: var(--red); }
    .m-btn.sm { padding: 3px 8px; font-size: 11px; }

    .si { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; border-radius: 6px; }
    .si:hover { background: var(--surface-hover); }
    .si-info { flex: 1; }
    .si-label { font-size: 13px; font-weight: 500; }
    .si-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .si-actions { display: flex; gap: 4px; }

    .fg { margin-bottom: 12px; }
    .fg label {
      display: block; font-size: 10px; font-weight: 700;
      color: var(--text-dim); margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .fg input, .fg select {
      width: 100%; padding: 7px 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-size: 12px; font-family: inherit; outline: none;
    }
    .fg input:focus, .fg select:focus { border-color: var(--blue); }
    .fg .hint { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-top">
        <h1>Lever</h1>
        <button class="icon-btn" onclick="showSettings()" title="Settings">&#9881;</button>
      </div>
      <div class="sidebar-scroll" id="sidebarScroll"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="tab-bar" id="tabBar">
        <div class="tab-new" onclick="newTerminalTab()" title="New terminal">+</div>
      </div>
      <div class="term-area" id="termArea">
        <div class="empty-state" id="emptyState">Press + to open a terminal</div>
        <div class="log-overlay" id="logOverlay">
          <div class="log-header">
            <span id="logOverlayTitle">Output</span>
            <div style="display:flex;gap:6px;align-items:center">
              <button class="m-btn sm" id="logOverlayClear">Clear</button>
              <button class="log-close" onclick="closeLogOverlay()">&times;</button>
            </div>
          </div>
          <div class="log-output" id="logOverlayOutput"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="sbRunning"></span>
    <span id="sbInfo" style="flex:1"></span>
  </div>

  <!-- Settings modal -->
  <div class="overlay" id="settingsOverlay" onclick="if(event.target===this)hideSettings()">
    <div class="modal">
      <div class="modal-header">
        <h2>Manage Services</h2>
        <div style="display:flex;gap:6px">
          <button class="m-btn primary" onclick="openForm()">+ Add</button>
          <button class="m-btn" onclick="hideSettings()">Done</button>
        </div>
      </div>
      <div class="modal-body" id="settingsBody"></div>
    </div>
  </div>

  <!-- Service form modal -->
  <div class="overlay" id="formOverlay" onclick="if(event.target===this)closeForm()" style="z-index:200">
    <div class="modal" style="width:460px;padding:20px">
      <h2 id="formTitle" style="font-size:14px;margin-bottom:14px">Add Service</h2>
      <div class="fg"><label>Group</label><select id="f-group"></select></div>
      <div class="fg"><label>Name</label><input id="f-label" placeholder="e.g. Docker Compose" /></div>
      <div class="fg"><label>Command</label><input id="f-command" placeholder="e.g. docker" /></div>
      <div class="fg"><label>Arguments</label><input id="f-args" placeholder="e.g. compose up" /></div>
      <div class="fg"><label>Working Directory</label><input id="f-cwd" placeholder="/path/to/project" /></div>
      <div class="fg"><label>Type</label>
        <select id="f-type"><option value="service">Service</option><option value="task">Task</option></select>
      </div>
      <div class="fg"><label>Stop Command</label><input id="f-stop" placeholder="e.g. docker compose stop" /><div class="hint">Optional — runs before killing</div></div>
      <div class="fg"><label>Description</label><input id="f-desc" placeholder="Optional" /></div>
      <div class="form-actions">
        <button class="m-btn" onclick="closeForm()">Cancel</button>
        <button class="m-btn primary" onclick="saveForm()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Prevent UMD libs from using CJS path in Tauri webview
    if (typeof module !== 'undefined') { window.__savedModule = module; window.module = undefined; }
    if (typeof exports !== 'undefined') { window.__savedExports = exports; window.exports = undefined; }
  </script>
  <script src="vendor/xterm.min.js"></script>
  <script src="vendor/xterm-addon-fit.min.js"></script>
  <script>
    // Restore if they existed
    if (typeof window.__savedModule !== 'undefined') { window.module = window.__savedModule; delete window.__savedModule; }
    if (typeof window.__savedExports !== 'undefined') { window.exports = window.__savedExports; delete window.__savedExports; }
  </script>
  <script>
    window.xtermReady = (typeof Terminal !== 'undefined' && typeof FitAddon !== 'undefined');

    // Inline editable input — inserts an input into a container, resolves on Enter/blur
    function inlineInput(container, defaultVal, placeholder) {
      return new Promise(resolve => {
        const input = document.createElement("input");
        input.value = defaultVal || "";
        input.placeholder = placeholder || "";
        input.style.cssText = "width:100%;background:var(--terminal-bg);border:1px solid var(--blue);border-radius:4px;color:var(--text);font-size:12px;padding:5px 8px;outline:none;font-family:inherit";
        container.innerHTML = "";
        container.appendChild(input);
        input.focus();
        let resolved = false;
        function done(val) { if (resolved) return; resolved = true; resolve(val); }
        input.onkeydown = (e) => {
          if (e.key === "Enter") done(input.value.trim() || null);
          if (e.key === "Escape") done(null);
        };
        input.onblur = () => done(input.value.trim() || null);
      });
    }

    function invoke(cmd, args) {
      if (!window.__TAURI_INTERNALS__) return Promise.reject("IPC not ready");
      return window.__TAURI_INTERNALS__.invoke(cmd, args);
    }

    // Listen to Tauri backend events (without npm SDK)
    function tauriListen(event, callback) {
      const handler = window.__TAURI_INTERNALS__.transformCallback((evt) => {
        callback(evt.payload);
      });
      return window.__TAURI_INTERNALS__.invoke('plugin:event|listen', {
        event,
        target: { kind: 'Any' },
        handler,
      });
    }

    // ---- State ----
    let config = { groups: [] };
    let statuses = {};
    let tabs = [];        // { id, type:'pty'|'log', ptyId?, svcId?, label }
    let activeTabId = null;
    const logEls = {};
    const autoScroll = {};
    const ptyTerms = {};  // tab.id -> { term, fitAddon, ptyId }
    let editingIndex = -1;
    let editingGroupId = null;

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    function allServices() {
      return config.groups.flatMap(g => g.services.map(s => ({ ...s, groupId: g.id, groupLabel: g.label })));
    }

    const collapsedGroups = new Set();
    const gitCache = {}; // groupId -> { current_branch, branches, is_dirty }
    let openBranchDropdown = null; // groupId of currently open dropdown

    // ---- Sidebar ----
    function renderSidebar() {
      const el = document.getElementById("sidebarScroll");
      el.innerHTML = "";

      for (const group of config.groups) {
        const div = document.createElement("div");
        div.className = "group" + (collapsedGroups.has(group.id) ? " collapsed" : "");
        div.id = "grp-" + group.id;

        const runningInGroup = group.services.filter(s => (statuses[s.id] || "stopped") === "running").length;

        div.innerHTML = `
          <div class="group-header" onclick="toggleGroup('${group.id}')">
            <span class="group-label"><span class="group-chevron">&#9660;</span>${esc(group.label)} <span class="group-count">${runningInGroup}/${group.services.length}</span></span>
            <div class="group-actions">
              <button class="group-btn start" onclick="event.stopPropagation();startGroup('${group.id}')" title="Start all">&#9654;</button>
              <button class="group-btn stop" onclick="event.stopPropagation();stopGroup('${group.id}')" title="Stop all">&#9724;</button>
            </div>
          </div>
          ${group.repo_path ? `<div class="git-branch" id="gitbranch-${group.id}" onclick="event.stopPropagation();openGitPanel('${group.id}')">
            <span class="git-branch-icon">&#9579;</span>
            <span class="git-branch-name" id="gitname-${group.id}">${gitCache[group.id]?.current_branch || '...'}</span>
            ${gitCache[group.id]?.is_dirty ? '<span class="git-dirty">&#9679;</span>' : ''}
          </div>` : ''}
          <div class="group-services" id="gsvc-${group.id}"></div>`;
        el.appendChild(div);

        const svcContainer = div.querySelector(`#gsvc-${group.id}`);
        for (const svc of group.services) {
          const st = statuses[svc.id] || "stopped";
          const isRunning = st === "running";
          const item = document.createElement("div");
          item.className = "svc-item";
          item.onclick = () => openServiceLog(svc.id);
          item.innerHTML = `
            <div class="svc-dot ${st}" id="sdot-${svc.id}"></div>
            <span class="svc-name">${esc(svc.label)}</span>
            ${svc.service_type === 'task' ? '<span class="svc-badge">Task</span>' : ''}
            <div class="svc-hover-actions">
              <button class="svc-btn play" onclick="event.stopPropagation();startSvc('${svc.id}')" ${isRunning ? 'disabled' : ''}>&#9654;</button>
              <button class="svc-btn kill" onclick="event.stopPropagation();stopSvc('${svc.id}')" ${!isRunning ? 'disabled' : ''}>&#9724;</button>
            </div>`;
          svcContainer.appendChild(item);
        }
      }

      // Add group button at the bottom
      const addBtn = document.createElement("button");
      addBtn.className = "add-group-btn";
      addBtn.innerHTML = "+ Add Group";
      addBtn.onclick = addGroup;
      el.appendChild(addBtn);
    }

    function toggleGroup(gid) {
      if (collapsedGroups.has(gid)) collapsedGroups.delete(gid);
      else collapsedGroups.add(gid);
      const grpEl = document.getElementById("grp-" + gid);
      if (grpEl) grpEl.classList.toggle("collapsed");
    }

    async function addGroup() {
      // Replace the add button with an inline input
      const el = document.getElementById("sidebarScroll");
      const wrapper = document.createElement("div");
      wrapper.style.cssText = "padding:6px 14px";
      el.appendChild(wrapper);
      el.scrollTop = el.scrollHeight;
      const name = await inlineInput(wrapper, "", "Group name...");
      if (!name) { renderSidebar(); return; }
      const gid = name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      if (config.groups.find(g => g.id === gid)) { renderSidebar(); return; }
      config.groups.push({ id: gid, label: name, services: [] });
      invoke("save_config", { config }).then(() => renderSidebar());
    }

    function updateSidebarDots() {
      for (const svc of allServices()) {
        const dot = document.getElementById(`sdot-${svc.id}`);
        if (dot) dot.className = `svc-dot ${statuses[svc.id] || "stopped"}`;
      }
      // Update group counts
      for (const group of config.groups) {
        const countEl = document.querySelector(`#gsvc-${group.id}`)?.previousElementSibling?.querySelector('.group-count');
        if (countEl) {
          const running = group.services.filter(s => (statuses[s.id] || "stopped") === "running").length;
          countEl.textContent = `${running}/${group.services.length}`;
        }
      }
    }

    // ---- Service actions ----
    async function startSvc(id) {
      try { await invoke("start_service", { id }); } catch (e) { appendServiceLog(id, "[error] " + e); }
    }
    async function stopSvc(id) {
      try { await invoke("stop_service", { id }); } catch (e) { appendServiceLog(id, "[error] " + e); }
    }
    async function startGroup(gid) {
      const group = config.groups.find(g => g.id === gid);
      if (!group) return;
      for (const svc of group.services) {
        if (svc.service_type === "task") continue;
        if ((statuses[svc.id] || "stopped") === "running") continue;
        await startSvc(svc.id);
      }
    }
    async function stopGroup(gid) {
      const group = config.groups.find(g => g.id === gid);
      if (!group) return;
      for (const svc of [...group.services].reverse()) {
        if ((statuses[svc.id] || "stopped") === "running") {
          await stopSvc(svc.id);
        }
      }
    }

    // ---- Tabs ----
    let tabCounter = 0;

    function renderTabs() {
      const bar = document.getElementById("tabBar");
      bar.innerHTML = "";

      for (const tab of tabs) {
        const t = document.createElement("div");
        t.className = `tab${activeTabId === tab.id ? ' active' : ''}`;
        t.innerHTML = `
          <span class="tdot running"></span>
          <span>${esc(tab.label)}</span>
          <span class="tclose" onclick="event.stopPropagation();closeTab('${tab.id}')">&times;</span>`;
        t.onclick = () => activateTab(tab.id);
        bar.appendChild(t);
      }

      const plus = document.createElement("div");
      plus.className = "tab-new";
      plus.onclick = newTerminalTab;
      plus.textContent = "+";
      plus.title = "New terminal";
      bar.appendChild(plus);
    }

    function activateTab(id) {
      activeTabId = id;
      closeLogOverlay();
      closeGitPanel();
      renderTabs();
      showActivePanel();
    }

    function showActivePanel() {
      const area = document.getElementById("termArea");
      const empty = document.getElementById("emptyState");

      // Hide all term panels
      for (const p of area.querySelectorAll(".term-panel")) p.classList.remove("active");

      if (!activeTabId) { empty.style.display = "flex"; return; }
      empty.style.display = "none";

      const tab = tabs.find(t => t.id === activeTabId);
      if (!tab) return;

      let panel = document.getElementById(`tp-${tab.id}`);
      if (!panel) {
        panel = document.createElement("div");
        panel.className = "term-panel";
        panel.id = `tp-${tab.id}`;
        area.appendChild(panel);
        initPtyTerminal(tab, panel);
      }
      panel.classList.add("active");
      const info = ptyTerms[tab.id];
      if (info) {
        info.fitAddon.fit();
        info.term.focus();
      }
    }

    function closeTab(id) {
      if (ptyTerms[id]) {
        invoke("close_pty", { id: ptyTerms[id].ptyId }).catch(() => {});
        ptyTerms[id].term.dispose();
        delete ptyTerms[id];
      }
      const panel = document.getElementById(`tp-${id}`);
      if (panel) panel.remove();
      tabs = tabs.filter(t => t.id !== id);
      if (activeTabId === id) activeTabId = tabs.length ? tabs[tabs.length - 1].id : null;
      renderTabs();
      showActivePanel();
    }

    // ---- PTY terminal ----
    async function newTerminalTab() {
      closeLogOverlay();
      closeGitPanel();
      tabCounter++;
      const tabId = `tab-${tabCounter}`;
      const tab = { id: tabId, type: "pty", label: "Terminal" };
      tabs.push(tab);
      activeTabId = tabId;
      renderTabs();
      showActivePanel();
    }

    async function initPtyTerminal(tab, container) {
      if (!window.xtermReady) {
        container.innerHTML = '<div style="padding:20px;color:var(--red)">xterm.js failed to load</div>';
        return;
      }
      const term = new Terminal({
        cursorBlink: true,
        fontSize: 13,
        fontFamily: "'SF Mono', 'JetBrains Mono', 'Fira Code', monospace",
        theme: {
          background: '#0a0c12',
          foreground: '#e2e5f0',
          cursor: '#60a5fa',
          selectionBackground: 'rgba(96,165,250,0.3)',
          black: '#1a1d27',
          red: '#f87171',
          green: '#34d399',
          yellow: '#fbbf24',
          blue: '#60a5fa',
          magenta: '#a78bfa',
          cyan: '#22d3ee',
          white: '#e2e5f0',
          brightBlack: '#6c7294',
          brightRed: '#fca5a5',
          brightGreen: '#6ee7b7',
          brightYellow: '#fde68a',
          brightBlue: '#93c5fd',
          brightMagenta: '#c4b5fd',
          brightCyan: '#67e8f9',
          brightWhite: '#f8fafc',
        },
        allowProposedApi: true,
      });

      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      fitAddon.fit();

      try {
        const info = await invoke("create_pty", { cols: term.cols, rows: term.rows });
        const ptyId = info.id;
        ptyTerms[tab.id] = { term, fitAddon, ptyId };

        // Send keystrokes to PTY
        term.onData(data => {
          invoke("write_pty", { id: ptyId, data }).catch(() => {});
        });

        // Handle resize
        term.onResize(({ cols, rows }) => {
          invoke("resize_pty", { id: ptyId, cols, rows }).catch(() => {});
        });

        // Window resize — debounce to avoid rapid resize_pty calls
        let resizeTimer = null;
        const ro = new ResizeObserver(() => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => fitAddon.fit(), 50);
        });
        ro.observe(container);

        term.focus();
      } catch (e) {
        term.write(`\r\nFailed to create terminal: ${e}\r\n`);
      }
    }

    // ---- Service log overlay ----
    let activeLogSvcId = null;

    function openServiceLog(svcId) {
      activeLogSvcId = svcId;
      const svc = allServices().find(s => s.id === svcId);
      document.getElementById("logOverlayTitle").textContent = (svc?.label || svcId) + " output";
      document.getElementById("logOverlayClear").onclick = () => {
        document.getElementById("logOverlayOutput").innerHTML = "";
        if (logEls[svcId]) logEls[svcId] = [];
      };
      // Render buffered log history
      const el = document.getElementById("logOverlayOutput");
      el.innerHTML = "";
      if (logEls[svcId]) {
        for (const line of logEls[svcId]) {
          const span = document.createElement("span");
          if (line.startsWith("[stderr]")) span.className = "stderr";
          span.textContent = line + "\n";
          el.appendChild(span);
        }
      }
      document.getElementById("logOverlay").classList.add("open");
      el.scrollTop = el.scrollHeight;
    }

    function closeLogOverlay() {
      activeLogSvcId = null;
      document.getElementById("logOverlay").classList.remove("open");
    }

    function appendServiceLog(svcId, line) {
      // Buffer all logs per service
      if (!logEls[svcId]) logEls[svcId] = [];
      logEls[svcId].push(line);
      while (logEls[svcId].length > 3000) logEls[svcId].shift();

      // If this service's overlay is open, append to it
      if (activeLogSvcId === svcId) {
        const el = document.getElementById("logOverlayOutput");
        const span = document.createElement("span");
        if (line.startsWith("[stderr]")) span.className = "stderr";
        span.textContent = line + "\n";
        el.appendChild(span);
        while (el.childNodes.length > 3000) el.removeChild(el.firstChild);
        el.scrollTop = el.scrollHeight;
      }
    }

    // ---- Git ----
    let activeGitGroupId = null; // which group's git panel is showing
    let gitPrCache = {};         // groupId -> [prs]

    async function refreshGitInfo(groupId) {
      const group = config.groups.find(g => g.id === groupId);
      if (!group?.repo_path) return;
      try {
        const info = await invoke("git_info", { path: group.repo_path });
        gitCache[groupId] = info;
        // Update sidebar branch name
        const nameEl = document.getElementById(`gitname-${groupId}`);
        if (nameEl) nameEl.textContent = info.current_branch;
        const branchEl = document.getElementById(`gitbranch-${groupId}`);
        if (branchEl) {
          const dirtyEl = branchEl.querySelector('.git-dirty');
          if (info.is_dirty && !dirtyEl) {
            const d = document.createElement("span");
            d.className = "git-dirty";
            d.innerHTML = "&#9679;";
            branchEl.appendChild(d);
          } else if (!info.is_dirty && dirtyEl) {
            dirtyEl.remove();
          }
        }
      } catch (e) {}
    }

    async function refreshAllGit() {
      for (const group of config.groups) {
        if (group.repo_path) refreshGitInfo(group.id);
      }
    }

    function openGitPanel(groupId) {
      closeLogOverlay();
      activeGitGroupId = groupId;
      // Show the git panel in the term area
      const area = document.getElementById("termArea");
      let panel = document.getElementById("gitPanelView");
      if (!panel) {
        panel = document.createElement("div");
        panel.className = "git-panel";
        panel.id = "gitPanelView";
        area.appendChild(panel);
      }
      // Hide term panels
      for (const p of area.querySelectorAll(".term-panel")) p.classList.remove("active");
      document.getElementById("emptyState").style.display = "none";

      // Deselect terminal tabs
      activeTabId = null;
      renderTabs();

      panel.classList.add("active");
      renderGitPanel(groupId);

      // Also load PRs
      loadPrs(groupId);
      // Refresh git info
      refreshGitInfo(groupId);
    }

    function closeGitPanel() {
      activeGitGroupId = null;
      const panel = document.getElementById("gitPanelView");
      if (panel) panel.classList.remove("active");
    }

    function renderGitPanel(groupId) {
      const panel = document.getElementById("gitPanelView");
      if (!panel) return;
      const group = config.groups.find(g => g.id === groupId);
      const info = gitCache[groupId];
      const prs = gitPrCache[groupId];

      if (!info) {
        panel.innerHTML = '<div class="git-loading">Loading git info...</div>';
        return;
      }

      const localBranches = info.branches.filter(b => !b.is_remote);
      const remoteBranches = info.branches.filter(b => b.is_remote);

      panel.innerHTML = `
        <div class="git-panel-header">
          <h3>
            <span>&#9579;</span>
            <span style="font-family:'SF Mono',monospace">${esc(info.current_branch)}</span>
            ${info.is_dirty ? '<span style="color:var(--yellow);font-size:10px">&#9679; modified</span>' : '<span style="color:var(--green);font-size:10px">clean</span>'}
          </h3>
          <div class="git-actions">
            <button class="m-btn sm" onclick="doGitFetch('${groupId}')">Fetch</button>
            <button class="m-btn sm" onclick="doGitPull('${groupId}')">Pull</button>
          </div>
        </div>
        <div class="git-panel-body" id="gitPanelBody">
          <!-- Changes -->
          ${info.changed_files.length > 0 ? `
          <div class="git-section" id="gsec-changes">
            <div class="git-section-header">
              Changes <span class="git-section-count">${info.changed_files.length}</span>
            </div>
            <div class="git-section-body" id="gchanges"></div>
          </div>` : ''}

          <!-- Local branches -->
          <div class="git-section" id="gsec-local">
            <div class="git-section-header">
              Local branches <span class="git-section-count">${localBranches.length}</span>
            </div>
            <div class="git-section-body" id="glocal">
              <input class="git-branch-search" id="gitLocalSearch" placeholder="Filter branches..." />
              <div id="glocalList"></div>
            </div>
          </div>

          <!-- Remote branches -->
          <div class="git-section" id="gsec-remote">
            <div class="git-section-header">
              Remote branches <span class="git-section-count">${remoteBranches.length}</span>
            </div>
            <div class="git-section-body" id="gremote">
              <input class="git-branch-search" id="gitRemoteSearch" placeholder="Filter remote branches..." />
              <div id="gremoteList"></div>
            </div>
          </div>

          <!-- PRs -->
          <div class="git-section" id="gsec-prs">
            <div class="git-section-header">
              Pull Requests <span class="git-section-count" id="gprCount">${prs ? prs.length : '...'}</span>
            </div>
            <div class="git-section-body" id="gprs">
              ${prs ? '' : '<div class="git-loading">Loading...</div>'}
            </div>
          </div>

          <!-- Recent commits -->
          <div class="git-section" id="gsec-commits">
            <div class="git-section-header">
              Recent commits <span class="git-section-count">${info.recent_commits.length}</span>
            </div>
            <div class="git-section-body" id="gcommits"></div>
          </div>
        </div>`;

      // Render changes
      if (info.changed_files.length > 0) {
        renderLazyList("gchanges", info.changed_files, 10, (f) => {
          const badge = f.status === 'new' ? 'A' : f.status === 'deleted' ? 'D' : f.status === 'renamed' ? 'R' : 'M';
          const cls = f.staged ? 'staged' : f.status;
          const item = document.createElement("div");
          item.className = "git-file-item";
          item.innerHTML = `<span class="git-file-badge ${cls}">${badge}</span><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(f.path)}</span>${f.staged ? '<span style="font-size:9px;color:var(--blue)">staged</span>' : ''}`;
          return item;
        });
      }

      // Render local branches
      renderBranchList("glocalList", localBranches, groupId, "gitLocalSearch");

      // Render remote branches (collapsed by default)
      renderBranchList("gremoteList", remoteBranches, groupId, "gitRemoteSearch");

      // Render PRs
      if (prs) renderPrList(prs);

      // Render commits
      renderLazyList("gcommits", info.recent_commits, 8, (c) => {
        const item = document.createElement("div");
        item.className = "git-commit-item";
        item.innerHTML = `<span class="git-commit-hash">${esc(c.short_hash)}</span><span class="git-commit-msg">${esc(c.summary)}</span><span class="git-commit-time">${esc(c.time_ago)}</span>`;
        return item;
      });
    }

    // Generic lazy list: renders `limit` items, then a "Show more" button
    function renderLazyList(containerId, items, limit, renderItem) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = "";
      let shown = 0;

      function showBatch() {
        const end = Math.min(shown + limit, items.length);
        for (let i = shown; i < end; i++) {
          container.appendChild(renderItem(items[i]));
        }
        shown = end;
        // Remove old show-more button
        const old = container.querySelector(".git-show-more");
        if (old) old.remove();
        // Add show-more if there's more
        if (shown < items.length) {
          const btn = document.createElement("button");
          btn.className = "git-show-more";
          btn.textContent = `Show more (${items.length - shown} remaining)`;
          btn.onclick = showBatch;
          container.appendChild(btn);
        }
      }

      showBatch();
    }

    function renderBranchList(containerId, branches, groupId, searchId) {
      const container = document.getElementById(containerId);
      const searchEl = document.getElementById(searchId);
      if (!container) return;
      const BATCH = 15;

      function render(filter) {
        container.innerHTML = "";
        const filtered = branches.filter(b =>
          !filter || b.name.toLowerCase().includes(filter.toLowerCase())
        );
        let shown = 0;

        function showBatch() {
          const end = Math.min(shown + BATCH, filtered.length);
          for (let i = shown; i < end; i++) {
            const b = filtered[i];
            const item = document.createElement("div");
            item.className = "git-branch-item" + (b.is_current ? " current" : "");
            item.innerHTML = `
              <span class="check">${b.is_current ? '&#10003;' : ''}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.name)}</span>
              ${b.is_remote ? '<span class="remote-tag">remote</span>' : ''}`;
            if (!b.is_current) {
              item.onclick = () => checkoutBranch(groupId, b.name, b.is_remote);
            }
            container.appendChild(item);
          }
          shown = end;
          const old = container.querySelector(".git-show-more");
          if (old) old.remove();
          if (shown < filtered.length) {
            const btn = document.createElement("button");
            btn.className = "git-show-more";
            btn.textContent = `Show more (${filtered.length - shown} remaining)`;
            btn.onclick = showBatch;
            container.appendChild(btn);
          }
        }

        if (filtered.length === 0) {
          container.innerHTML = '<div class="git-empty">No matching branches</div>';
        } else {
          showBatch();
        }
      }

      render("");
      if (searchEl) searchEl.oninput = () => render(searchEl.value);
    }

    async function loadPrs(groupId) {
      const group = config.groups.find(g => g.id === groupId);
      if (!group?.repo_path) return;
      try {
        const prs = await invoke("git_pr_list", { path: group.repo_path });
        gitPrCache[groupId] = prs;
        if (activeGitGroupId === groupId) {
          const countEl = document.getElementById("gprCount");
          if (countEl) countEl.textContent = prs.length;
          renderPrList(prs);
        }
      } catch (e) {
        const el = document.getElementById("gprs");
        if (el) el.innerHTML = `<div class="git-empty">Could not load PRs: ${esc(String(e))}</div>`;
      }
    }

    function renderPrList(prs) {
      const el = document.getElementById("gprs");
      if (!el) return;
      el.innerHTML = "";
      if (prs.length === 0) {
        el.innerHTML = '<div class="git-empty">No open pull requests</div>';
        return;
      }
      renderLazyList("gprs", prs, 10, (pr) => {
        const item = document.createElement("div");
        item.className = "git-pr-item";
        item.onclick = () => {
          const info = gitCache[activeGitGroupId];
          const localMatch = info?.branches.find(b => !b.is_remote && b.name === pr.branch);
          const remoteMatch = info?.branches.find(b => b.is_remote && b.name.endsWith('/' + pr.branch));
          if (localMatch) checkoutBranch(activeGitGroupId, pr.branch, false);
          else if (remoteMatch) checkoutBranch(activeGitGroupId, remoteMatch.name, true);
        };
        item.innerHTML = `
          <div class="git-pr-row">
            <span class="git-pr-number">#${pr.number}</span>
            <span class="git-pr-title">${esc(pr.title)}</span>
            ${pr.is_draft ? '<span class="git-pr-draft">Draft</span>' : ''}
          </div>
          <div class="git-pr-meta">
            <span>${esc(pr.author)}</span>
            <span style="font-family:'SF Mono',monospace">${esc(pr.branch)}</span>
          </div>`;
        return item;
      });
    }

    async function checkoutBranch(groupId, branch, isRemote) {
      const group = config.groups.find(g => g.id === groupId);
      if (!group?.repo_path) return;

      const nameEl = document.getElementById(`gitname-${groupId}`);
      const shortName = isRemote ? branch.split('/').slice(1).join('/') : branch;
      if (nameEl) nameEl.textContent = shortName + "...";

      try {
        await invoke("git_checkout", { path: group.repo_path, branch, isRemote: isRemote || false });
        await refreshGitInfo(groupId);
      } catch (e) {
        document.getElementById("sbInfo").textContent = "Checkout failed: " + e;
        setTimeout(() => { document.getElementById("sbInfo").textContent = ""; }, 4000);
        await refreshGitInfo(groupId);
      }
    }

    async function doGitFetch(groupId) {
      const group = config.groups.find(g => g.id === groupId);
      if (!group?.repo_path) return;
      document.getElementById("sbInfo").textContent = "Fetching...";
      try {
        await invoke("git_fetch", { path: group.repo_path });
        document.getElementById("sbInfo").textContent = "Fetch complete";
        await refreshGitInfo(groupId);
        loadPrs(groupId);
      } catch (e) {
        document.getElementById("sbInfo").textContent = "Fetch failed: " + e;
      }
      setTimeout(() => { document.getElementById("sbInfo").textContent = ""; }, 3000);
    }

    async function doGitPull(groupId) {
      const group = config.groups.find(g => g.id === groupId);
      if (!group?.repo_path) return;
      document.getElementById("sbInfo").textContent = "Pulling...";
      try {
        const msg = await invoke("git_pull", { path: group.repo_path });
        document.getElementById("sbInfo").textContent = "Pull complete";
        await refreshGitInfo(groupId);
      } catch (e) {
        document.getElementById("sbInfo").textContent = "Pull failed: " + e;
      }
      setTimeout(() => { document.getElementById("sbInfo").textContent = ""; }, 3000);
    }

    // ---- Poll ----
    async function pollLoop() {
      try {
        const result = await invoke("poll", {});
        if (result) {
          for (const s of result.statuses) statuses[s.id] = s.status;
          updateSidebarDots();
          updateStatusBar();
          // Update tab dots
          renderTabs();
          for (const [id, lines] of Object.entries(result.logs)) {
            for (const line of lines) appendServiceLog(id, line);
          }
        }
      } catch(e) {}
      setTimeout(pollLoop, 300);
    }

    // Git refresh on a slower cadence (every 5s)
    async function gitPollLoop() {
      await refreshAllGit();
      setTimeout(gitPollLoop, 5000);
    }

    function updateStatusBar() {
      const svcs = allServices();
      const running = svcs.filter(s => (statuses[s.id] || "stopped") === "running").length;
      document.getElementById("sbRunning").textContent = `${running}/${svcs.length} running`;
    }

    // ---- Settings ----
    function showSettings() { document.getElementById("settingsOverlay").classList.add("open"); renderSettingsList(); }
    function hideSettings() { document.getElementById("settingsOverlay").classList.remove("open"); renderSidebar(); }

    function renderSettingsList() {
      const el = document.getElementById("settingsBody");
      el.innerHTML = "";
      for (const group of config.groups) {
        const gh = document.createElement("div");
        gh.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:10px 10px 4px";
        gh.innerHTML = `
          <span style="font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em">${esc(group.label)}</span>
          <div style="display:flex;gap:4px">
            <button class="m-btn sm" onclick="renameGroup('${group.id}',this)">Rename</button>
            <button class="m-btn sm danger" onclick="deleteGroup('${group.id}',this)">Delete</button>
          </div>`;
        el.appendChild(gh);

        // Repo path setting
        const rp = document.createElement("div");
        rp.style.cssText = "padding:2px 10px 8px;display:flex;align-items:center;gap:6px";
        rp.innerHTML = `
          <span style="font-size:10px;color:var(--text-muted);white-space:nowrap">Repo:</span>
          <input style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:'SF Mono',monospace;outline:none"
            value="${esc(group.repo_path || '')}" placeholder="/path/to/repo"
            onchange="updateRepoPath('${group.id}',this.value)" />`;
        el.appendChild(rp);

        group.services.forEach((svc, i) => {
          const item = document.createElement("div");
          item.className = "si";
          item.innerHTML = `
            <div class="si-info">
              <div class="si-label">${esc(svc.label)} <span class="svc-badge">${svc.service_type}</span></div>
              <div class="si-meta">${esc(svc.command)} ${esc(svc.args.join(" "))}</div>
            </div>
            <div class="si-actions">
              <button class="m-btn sm" onclick="editService('${group.id}',${i})">Edit</button>
              <button class="m-btn sm danger" onclick="deleteService('${group.id}',${i})">Delete</button>
            </div>`;
          el.appendChild(item);
        });

        if (group.services.length === 0) {
          const empty = document.createElement("div");
          empty.style.cssText = "padding:8px 10px;font-size:11px;color:var(--text-muted);font-style:italic";
          empty.textContent = "No services in this group";
          el.appendChild(empty);
        }
      }
    }

    function updateRepoPath(gid, val) {
      const g = config.groups.find(g => g.id === gid);
      if (!g) return;
      g.repo_path = val.trim();
      invoke("save_config", { config }).then(() => { renderSidebar(); refreshGitInfo(gid); });
    }

    async function renameGroup(gid, el) {
      const g = config.groups.find(g => g.id === gid);
      if (!g) return;
      // Replace the group header label with inline input
      const wrapper = el.closest('.modal-body') ? el.parentElement.previousElementSibling : el;
      const name = await inlineInput(wrapper, g.label, "Group name...");
      if (!name) { renderSettingsList(); return; }
      g.label = name;
      invoke("save_config", { config }).then(() => { renderSettingsList(); renderSidebar(); });
    }

    function deleteGroup(gid, btn) {
      const g = config.groups.find(g => g.id === gid);
      if (!g) return;
      if (g.services.length > 0 && !btn.dataset.confirmed) {
        btn.textContent = "Confirm?";
        btn.dataset.confirmed = "1";
        setTimeout(() => { btn.textContent = "Delete"; delete btn.dataset.confirmed; }, 2000);
        return;
      }
      config.groups = config.groups.filter(g => g.id !== gid);
      invoke("save_config", { config }).then(() => { renderSettingsList(); renderSidebar(); });
    }

    function deleteService(gid, i) {
      const g = config.groups.find(g => g.id === gid);
      if (g) { g.services.splice(i, 1); invoke("save_config", { config }).then(() => renderSettingsList()); }
    }
    function editService(gid, i) {
      editingGroupId = gid;
      editingIndex = i;
      const g = config.groups.find(g => g.id === gid);
      const svc = g?.services[i];
      populateForm(svc, gid);
    }

    // ---- Form ----
    function openForm() { editingGroupId = null; editingIndex = -1; populateForm(null, null); }

    function populateForm(svc, gid) {
      document.getElementById("formTitle").textContent = svc ? "Edit Service" : "Add Service";
      const groupSel = document.getElementById("f-group");
      groupSel.innerHTML = config.groups.map(g =>
        `<option value="${g.id}" ${g.id === gid ? 'selected' : ''}>${esc(g.label)}</option>`
      ).join('') + '<option value="__new__">+ New Group...</option>';
      document.getElementById("f-label").value = svc?.label || "";
      document.getElementById("f-command").value = svc?.command || "";
      document.getElementById("f-args").value = svc?.args?.join(" ") || "";
      document.getElementById("f-cwd").value = svc?.cwd || "";
      document.getElementById("f-type").value = svc?.service_type || "service";
      document.getElementById("f-stop").value = svc?.stop_command?.join(" ") || "";
      document.getElementById("f-desc").value = svc?.description || "";
      document.getElementById("formOverlay").classList.add("open");
    }

    function closeForm() { document.getElementById("formOverlay").classList.remove("open"); }

    async function saveForm() {
      const label = document.getElementById("f-label").value.trim();
      const command = document.getElementById("f-command").value.trim();
      if (!label || !command) return;

      let gid = document.getElementById("f-group").value;
      if (gid === "__new__") {
        const wrapper = document.createElement("div");
        document.getElementById("f-group").parentElement.appendChild(wrapper);
        const name = await inlineInput(wrapper, "", "New group name...");
        wrapper.remove();
        if (!name) return;
        gid = name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
        config.groups.push({ id: gid, label: name, services: [] });
      }

      const args = document.getElementById("f-args").value.trim();
      const stopStr = document.getElementById("f-stop").value.trim();
      const svc = {
        id: editingIndex >= 0 ? config.groups.find(g => g.id === editingGroupId)?.services[editingIndex]?.id : label.toLowerCase().replace(/[^a-z0-9]+/g, "-"),
        label, command,
        description: document.getElementById("f-desc").value.trim(),
        args: args ? args.split(/\s+/) : [],
        cwd: document.getElementById("f-cwd").value.trim(),
        service_type: document.getElementById("f-type").value,
        stop_command: stopStr ? stopStr.split(/\s+/) : [],
      };

      if (editingIndex >= 0 && editingGroupId) {
        const oldGroup = config.groups.find(g => g.id === editingGroupId);
        if (editingGroupId === gid) {
          oldGroup.services[editingIndex] = svc;
        } else {
          oldGroup.services.splice(editingIndex, 1);
          config.groups.find(g => g.id === gid)?.services.push(svc);
        }
      } else {
        const group = config.groups.find(g => g.id === gid);
        let base = svc.id, n = 1;
        const allIds = allServices().map(s => s.id);
        while (allIds.includes(svc.id)) svc.id = base + "-" + (++n);
        group.services.push(svc);
      }

      invoke("save_config", { config }).then(() => { closeForm(); renderSettingsList(); renderSidebar(); });
    }

    // ---- Init ----
    async function init() {
      while (!window.__TAURI_INTERNALS__) await new Promise(r => setTimeout(r, 50));

      // Listen for PTY data events (streamed from backend threads, not polled)
      tauriListen("pty-data", (payload) => {
        // Find the terminal that matches this PTY id
        for (const tabId in ptyTerms) {
          if (ptyTerms[tabId].ptyId === payload.id) {
            ptyTerms[tabId].term.write(payload.data);
            break;
          }
        }
      });

      try { config = await invoke("get_config", {}); } catch(e) { config = { groups: [] }; }
      renderSidebar();
      newTerminalTab();
      updateStatusBar();
      refreshAllGit();
      pollLoop();
      gitPollLoop();
    }

    init();
  </script>
</body>
</html>
